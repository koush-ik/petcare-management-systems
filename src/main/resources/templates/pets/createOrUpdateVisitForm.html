<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'owners')}">

<body>

  <div class="page-header-bar">
    <h2>
      <th:block th:if="${visit['new']}">New Visit</th:block>
      <th:block th:unless="${visit['new']}">Edit Visit</th:block>
    </h2>
  </div>

  <!-- Pet Info Card -->
  <div class="card-modern" style="padding:1.5rem;margin-bottom:2rem;display:flex;align-items:center;gap:1.25rem;">
    <div style="width:52px;height:52px;background:linear-gradient(135deg,var(--forest-mid),var(--forest-light));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;">🐾</div>
    <div>
      <div style="font-weight:700;font-size:1.05rem;color:var(--forest);" th:text="${pet.name}">Pet Name</div>
      <div style="font-size:0.82rem;color:var(--text-muted);margin-top:3px;">
        <span th:text="${pet.type}"></span>
        &nbsp;·&nbsp; Born <span th:text="${#temporals.format(pet.birthDate, 'MMM dd, yyyy')}"></span>
        &nbsp;·&nbsp; Owner: <span th:text="${owner?.firstName + ' ' + owner?.lastName}"></span>
      </div>
    </div>
  </div>

  <!-- Visit Form -->
  <div class="form-card">
    <form th:object="${visit}" class="form-horizontal" method="post">
      <div class="form-group" th:classappend="${#fields.hasErrors('date')} ? 'has-error'">
        <label th:text="#{date}">Date</label>
        <input type="date" th:field="*{date}" />
        <span class="help-block" th:if="${#fields.hasErrors('date')}" th:errors="*{date}">Error</span>
      </div>

      <div class="form-group" th:classappend="${#fields.hasErrors('description')} ? 'has-error'">
        <label th:text="#{description}">Description</label>
        <input type="text" th:field="*{description}" placeholder="Reason for visit..." />
        <span class="help-block" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Error</span>
      </div>

      <input type="hidden" name="petId" th:value="${pet.id}" />

      <div class="btn-group">
        <button class="btn btn-primary" type="submit">
          <span class="fa fa-calendar-check-o"></span>
          <span th:text="#{addVisit}">Add Visit</span>
        </button>
      </div>
    </form>
  </div>

  <!-- Previous Visits -->
  <div th:if="${!visit['new']}" style="margin-top:2rem;">
    <h3 th:text="#{previousVisits}" style="margin-bottom:1rem;">Previous Visits</h3>
    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th th:text="#{date}">Date</th>
            <th th:text="#{description}">Description</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="visit : ${pet.visits}">
            <td th:text="${#temporals.format(visit.date, 'MMM dd, yyyy')}"></td>
            <td th:text="${visit.description}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</body>

</html>
