<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'home')}">

<body>

  <div class="welcome-hero">
    <div class="welcome-hero-content">
      <h1>Caring for your <span>beloved pets</span>, always.</h1>
      <p>Welcome to PetClinic — where every tail wag, purr, and chirp matters. Find owners, manage visits, and meet our dedicated veterinary team.</p>
      <div class="welcome-cta">
        <a href="/owners/find" class="cta-primary">🔍 Find an Owner</a>
        <a href="/vets.html" class="cta-secondary">👨‍⚕️ Our Veterinarians</a>
      </div>
    </div>
    <div class="welcome-hero-image">
      <img src="../static/resources/images/pets.png"
           th:src="@{/resources/images/pets.png}"
           alt="Pets" />
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon green">🏠</div>
      <div>
        <div class="stat-value">+100</div>
        <div class="stat-label">Pet Owners</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon amber">🐾</div>
      <div>
        <div class="stat-value">+200</div>
        <div class="stat-label">Pets Registered</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon blue">🩺</div>
      <div>
        <div class="stat-value">6</div>
        <div class="stat-label">Veterinarians</div>
      </div>
    </div>
  </div>

</body>

</html>
