<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'vets')}">

<body>

  <div class="page-header-bar">
    <h2 th:text="#{vets}">Veterinarians</h2>
  </div>

  <div class="table-wrapper">
    <table id="vets" class="table">
      <thead>
        <tr>
          <th th:text="#{name}">Name</th>
          <th th:text="#{specialties}">Specialties</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="vet : ${listVets}">
          <td style="font-weight:600;">
            <span style="display:inline-flex;align-items:center;gap:10px;">
              <span style="width:36px;height:36px;background:linear-gradient(135deg,var(--forest-mid),var(--forest-light));border-radius:10px;display:inline-flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:0.9rem;"
                th:text="${#strings.substring(vet.firstName,0,1)}">J</span>
              <span th:text="${vet.firstName + ' ' + vet.lastName}">Dr. Vet</span>
            </span>
          </td>
          <td>
            <span th:each="specialty : ${vet.specialties}" class="specialty-tag" th:text="${specialty.name}">Surgery</span>
            <span th:if="${vet.nrOfSpecialties == 0}" class="no-specialty" th:text="#{none}">none</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div th:if="${totalPages > 1}" class="pagination-wrapper">
    <a th:if="${currentPage > 1}" th:href="@{'/vets.html?page=1'}" th:title="#{first}" class="fa fa-fast-backward"></a>
    <span th:unless="${currentPage > 1}" class="fa fa-fast-backward"></span>

    <a th:if="${currentPage > 1}" th:href="@{'/vets.html?page=__${currentPage - 1}__'}" th:title="#{previous}" class="fa fa-step-backward"></a>
    <span th:unless="${currentPage > 1}" class="fa fa-step-backward"></span>

    <span th:each="i: ${#numbers.sequence(1, totalPages)}">
      <a th:if="${currentPage != i}" th:href="@{'/vets.html?page=__${i}__'}">[[${i}]]</a>
      <span th:unless="${currentPage != i}" style="background:var(--forest);color:white;border-color:var(--forest);">[[${i}]]</span>
    </span>

    <a th:if="${currentPage < totalPages}" th:href="@{'/vets.html?page=__${currentPage + 1}__'}" th:title="#{next}" class="fa fa-step-forward"></a>
    <span th:unless="${currentPage < totalPages}" class="fa fa-step-forward"></span>

    <a th:if="${currentPage < totalPages}" th:href="@{'/vets.html?page=__${totalPages}__'}" th:title="#{last}" class="fa fa-fast-forward"></a>
    <span th:unless="${currentPage < totalPages}" class="fa fa-fast-forward"></span>
  </div>

</body>

</html>
