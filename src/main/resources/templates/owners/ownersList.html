<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'owners')}">

<body>

  <div class="page-header-bar">
    <h2 th:text="#{owners}">Owners</h2>
    <a th:href="@{/owners/new}" class="btn btn-amber">
      <span class="fa fa-plus"></span> Add New Owner
    </a>
  </div>

  <div class="table-wrapper">
    <table id="owners" class="table">
      <thead>
        <tr>
          <th th:text="#{name}">Name</th>
          <th th:text="#{address}">Address</th>
          <th th:text="#{city}">City</th>
          <th th:text="#{telephone}">Telephone</th>
          <th th:text="#{pets}">Pets</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="owner : ${listOwners}">
          <td>
            <a th:href="@{/owners/__${owner.id}__}" th:text="${owner.firstName + ' ' + owner.lastName}"></a>
          </td>
          <td th:text="${owner.address}" />
          <td th:text="${owner.city}" />
          <td th:text="${owner.telephone}" />
          <td>
            <span class="pet-badge" th:each="pet : ${owner.pets}">
              🐾 <span th:text="${pet.name}"></span>
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div th:if="${totalPages > 1}" class="pagination-wrapper">
    <span th:text="#{pages}">Pages:</span>
    <a th:if="${currentPage > 1}" th:href="@{'/owners?page=1'}" th:title="#{first}" class="fa fa-fast-backward"></a>
    <span th:unless="${currentPage > 1}" th:title="#{first}" class="fa fa-fast-backward"></span>

    <a th:if="${currentPage > 1}" th:href="@{'/owners?page=__${currentPage - 1}__'}" th:title="#{previous}" class="fa fa-step-backward"></a>
    <span th:unless="${currentPage > 1}" th:title="#{previous}" class="fa fa-step-backward"></span>

    <span th:each="i: ${#numbers.sequence(1, totalPages)}">
      <a th:if="${currentPage != i}" th:href="@{'/owners?page=' + ${i}}">[[${i}]]</a>
      <span th:unless="${currentPage != i}" style="background:var(--forest);color:white;border-color:var(--forest);">[[${i}]]</span>
    </span>

    <a th:if="${currentPage < totalPages}" th:href="@{'/owners?page=__${currentPage + 1}__'}" th:title="#{next}" class="fa fa-step-forward"></a>
    <span th:unless="${currentPage < totalPages}" th:title="#{next}" class="fa fa-step-forward"></span>

    <a th:if="${currentPage < totalPages}" th:href="@{'/owners?page=__${totalPages}__'}" th:title="#{last}" class="fa fa-fast-forward"></a>
    <span th:unless="${currentPage < totalPages}" th:title="#{last}" class="fa fa-fast-forward"></span>
  </div>

</body>

</html>
