<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'owners')}">

<body>

  <div class="page-header-bar">
    <h2 th:text="#{ownerInformation}">Owner Information</h2>
    <a href="/owners/find" class="btn btn-secondary">
      <span class="fa fa-arrow-left"></span> Back to Owners
    </a>
  </div>

  <div th:if="${message}" class="alert alert-success" id="success-message">
    <span th:text="${message}"></span>
  </div>
  <div th:if="${error}" class="alert alert-danger" id="error-message">
    <span th:text="${error}"></span>
  </div>

  <!-- Owner Profile Card -->
  <div class="owner-profile" th:object="${owner}">
    <div class="owner-avatar" th:text="${#strings.substring(owner.firstName,0,1)}">J</div>
    <div>
      <h3 style="font-size:1.5rem;margin-bottom:1rem;" th:text="*{firstName + ' ' + lastName}">John Doe</h3>
      <div class="owner-info-grid">
        <div class="owner-info-item">
          <label th:text="#{address}">Address</label>
          <span th:text="*{address}">123 Main St</span>
        </div>
        <div class="owner-info-item">
          <label th:text="#{city}">City</label>
          <span th:text="*{city}">Anytown</span>
        </div>
        <div class="owner-info-item">
          <label th:text="#{telephone}">Telephone</label>
          <span th:text="*{telephone}">555-0100</span>
        </div>
      </div>
      <div class="btn-group">
        <a th:href="@{__${owner.id}__/edit}" class="btn btn-primary">
          <span class="fa fa-pencil"></span> <span th:text="#{editOwner}">Edit Owner</span>
        </a>
        <a th:href="@{__${owner.id}__/pets/new}" class="btn btn-amber">
          <span class="fa fa-plus"></span> <span th:text="#{addNewPet}">Add New Pet</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Pets Section -->
  <h2 th:text="#{petsAndVisits}" style="margin-bottom:1.5rem;">Pets and Visits</h2>

  <div th:each="pet : ${owner.pets}" class="pet-card">
    <div class="pet-card-header">
      <div class="pet-emoji">
        <span th:if="${pet.type.name == 'cat'}">🐱</span>
        <span th:if="${pet.type.name == 'dog'}">🐶</span>
        <span th:if="${pet.type.name == 'bird'}">🐦</span>
        <span th:if="${pet.type.name == 'hamster'}">🐹</span>
        <span th:if="${pet.type.name == 'lizard'}">🦎</span>
        <span th:if="${pet.type.name == 'snake'}">🐍</span>
        <span th:unless="${pet.type.name == 'cat' or pet.type.name == 'dog' or pet.type.name == 'bird' or pet.type.name == 'hamster' or pet.type.name == 'lizard' or pet.type.name == 'snake'}">🐾</span>
      </div>
      <div>
        <div class="pet-card-title" th:text="${pet.name}">Buddy</div>
        <div class="pet-card-meta">
          <span th:text="${pet.type}"></span>
          &nbsp;·&nbsp;
          Born <span th:text="${#temporals.format(pet.birthDate, 'MMM dd, yyyy')}"></span>
        </div>
      </div>
    </div>

    <div class="pet-card-body">
      <div class="table-wrapper" style="box-shadow:none;border:1px solid var(--cream-dark);">
        <table class="table" th:if="${!pet.visits.isEmpty()}">
          <thead>
            <tr>
              <th th:text="#{visitDate}">Visit Date</th>
              <th th:text="#{description}">Description</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="visit : ${pet.visits}">
              <td th:text="${#temporals.format(visit.date, 'MMM dd, yyyy')}"></td>
              <td th:text="${visit?.description}"></td>
            </tr>
          </tbody>
        </table>
        <div th:if="${pet.visits.isEmpty()}" style="padding:1.5rem;text-align:center;color:var(--text-muted);font-size:0.9rem;">
          No visits recorded yet.
        </div>
      </div>
    </div>

    <div class="pet-card-actions">
      <a th:href="@{__${owner.id}__/pets/__${pet.id}__/edit}" class="btn btn-secondary btn-sm">
        <span class="fa fa-pencil"></span> <span th:text="#{editPet}">Edit Pet</span>
      </a>
      <a th:href="@{__${owner.id}__/pets/__${pet.id}__/visits/new}" class="btn btn-primary btn-sm">
        <span class="fa fa-calendar-plus-o"></span> <span th:text="#{addVisit}">Add Visit</span>
      </a>
    </div>
  </div>

  <script>
    function hideMessages() {
      setTimeout(function () {
        var s = document.getElementById("success-message");
        var e = document.getElementById("error-message");
        if (s) s.style.display = "none";
        if (e) e.style.display = "none";
      }, 3000);
    }
    hideMessages();
  </script>

</body>

</html>
