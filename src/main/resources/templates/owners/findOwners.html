<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'owners')}">

<body>

  <div class="page-header-bar">
    <h2 th:text="#{findOwners}">Find Owners</h2>
  </div>

  <div class="form-card">
    <p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:1.5rem;">Search by last name, or leave blank to find all owners.</p>
    <form th:object="${owner}" method="get">
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" th:field="*{lastName}" id="lastName" placeholder="e.g. Franklin" />
        <span th:if="${#fields.hasErrors('lastName')}" class="help-block" th:errors="*{lastName}">Error</span>
      </div>
      <button class="btn btn-primary" type="submit">
        <span class="fa fa-search"></span> Find Owner
      </button>
      <a href="/owners/new" class="btn btn-amber" style="margin-left:0.75rem;">
        <span class="fa fa-plus"></span> Add Owner
      </a>
    </form>
  </div>

</body>

</html>
